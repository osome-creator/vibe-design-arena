<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石头科技财务分析报告</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-light: #e8f0fe;
    --success: #0d904f;
    --success-light: #e6f4ea;
    --warning: #e37400;
    --warning-light: #fef7e0;
    --danger: #d93025;
    --danger-light: #fce8e6;
    --gray-50: #f8f9fa;
    --gray-100: #f1f3f4;
    --gray-200: #e8eaed;
    --gray-300: #dadce0;
    --gray-500: #9aa0a6;
    --gray-700: #5f6368;
    --gray-900: #202124;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px rgba(0,0,0,.05), 0 4px 6px rgba(0,0,0,.05);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #f0f2f5;
    color: var(--gray-900);
    line-height: 1.6;
  }

  /* Loading & Error */
  #loading, #error {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    font-size: 1.2rem; color: var(--gray-700);
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 4px solid var(--gray-200);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error {
    display: none; flex-direction: column; gap: 12px; text-align: center;
    color: var(--danger); max-width: 500px; margin: 0 auto;
  }
  #error code { background: var(--gray-100); padding: 4px 10px; border-radius: 4px; font-size: 0.9rem; }

  /* Header */
  .report-header {
    background: linear-gradient(135deg, #1a3a5c 0%, #1a5276 40%, #1a73e8 100%);
    color: #fff; padding: 48px 24px 40px; text-align: center;
  }
  .report-header .badge {
    display: inline-block; background: rgba(255,255,255,.18);
    padding: 4px 16px; border-radius: 20px; font-size: 0.85rem;
    letter-spacing: 1px; margin-bottom: 16px;
  }
  .report-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .report-header .meta {
    display: flex; justify-content: center; flex-wrap: wrap;
    gap: 16px 32px; font-size: 0.9rem; opacity: 0.85; margin-top: 16px;
  }
  .report-header .meta span { display: flex; align-items: center; gap: 6px; }
  .report-header .stock-code {
    display: inline-block; background: rgba(255,255,255,.15);
    padding: 3px 12px; border-radius: 6px; font-weight: 600;
    font-variant-numeric: tabular-nums; margin-left: 4px;
  }

  /* Container */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }

  /* Sections */
  .section {
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm);
    margin-bottom: 20px; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 24px; border-bottom: 1px solid var(--gray-200);
    font-size: 1.15rem; font-weight: 600; cursor: default;
  }
  .section-header .icon { font-size: 1.4rem; }
  .section-body { padding: 20px 24px; }

  /* Table styles */
  .data-table {
    width: 100%; border-collapse: collapse; font-size: 0.9rem;
  }
  .data-table thead th {
    background: var(--gray-50); padding: 10px 14px; text-align: right;
    font-weight: 600; color: var(--gray-700); border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
  }
  .data-table thead th:first-child { text-align: left; }
  .data-table tbody td {
    padding: 9px 14px; border-bottom: 1px solid var(--gray-100);
    text-align: right; font-variant-numeric: tabular-nums;
  }
  .data-table tbody td:first-child { text-align: left; font-weight: 500; }
  .data-table tbody tr:hover { background: var(--gray-50); }
  .data-table tbody tr.forecast-row { background: #fafafa; }
  .data-table tbody tr.forecast-row td:first-child::after {
    content: "E"; font-size: 0.7rem; color: var(--gray-500); margin-left: 2px;
    vertical-align: super;
  }
  .num-positive { color: var(--success); }
  .num-negative { color: var(--danger); }
  .num-neutral { color: var(--gray-700); }

  /* Card grid */
  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--gray-50); border-radius: var(--radius-sm);
    padding: 16px 20px; border: 1px solid var(--gray-200);
    transition: var(--transition);
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card .card-label { font-size: 0.8rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .card .card-value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .card .card-sub { font-size: 0.85rem; color: var(--gray-700); margin-top: 4px; }

  /* Conclusion cards */
  .conclusion-card {
    background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
    padding: 18px 20px; border-left: 4px solid var(--primary);
    transition: var(--transition);
  }
  .conclusion-card:hover { box-shadow: var(--shadow-md); }
  .conclusion-card.risk-true { border-left-color: var(--danger); }
  .conclusion-card.risk-false { border-left-color: var(--success); }
  .conclusion-card .conclusion-topic {
    font-weight: 700; font-size: 1rem; margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .conclusion-card .risk-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.75rem; font-weight: 600;
  }
  .risk-badge.warn { background: var(--danger-light); color: var(--danger); }
  .risk-badge.ok { background: var(--success-light); color: var(--success); }
  .conclusion-card .strategic-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.75rem; font-weight: 600;
    background: var(--primary-light); color: var(--primary);
  }
  .conclusion-card p { font-size: 0.9rem; color: var(--gray-700); line-height: 1.7; }
  .conclusion-card .strategic-note {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--gray-200);
    font-size: 0.85rem; color: var(--gray-700); font-style: italic;
  }

  /* Investment opinion */
  .rating-card {
    background: linear-gradient(135deg, #f8f9fa, #fff);
    border: 2px solid var(--warning); border-radius: var(--radius);
    padding: 24px 28px; text-align: center;
  }
  .rating-card .rating-badge {
    display: inline-block; font-size: 2rem; font-weight: 800;
    color: var(--warning); padding: 8px 32px;
    border: 3px solid var(--warning); border-radius: 16px;
    margin-bottom: 16px;
  }
  .rating-card .advice { margin-top: 12px; }
  .rating-card .advice-item { margin-bottom: 8px; font-size: 0.92rem; }
  .rating-card .advice-item strong { color: var(--gray-900); }

  /* Chart container */
  .chart-wrapper {
    background: #fff; border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); padding: 16px;
    margin: 16px 0;
  }
  .chart-wrapper canvas { width: 100%; display: block; }

  /* Risk list */
  .risk-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .risk-list li {
    background: var(--danger-light); padding: 12px 18px; border-radius: var(--radius-sm);
    display: flex; gap: 12px; align-items: baseline; font-size: 0.9rem;
  }
  .risk-list li .risk-icon { font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
  .risk-list li .risk-impact { color: var(--gray-700); }

  /* Forecast assumptions */
  .assumption-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .assumption-list li {
    padding: 6px 0; font-size: 0.9rem; color: var(--gray-700);
    display: flex; gap: 8px; align-items: baseline;
  }
  .assumption-list li::before { content: "▸"; color: var(--primary); flex-shrink: 0; }

  /* Notes */
  .notes { font-size: 0.8rem; color: var(--gray-500); margin-top: 8px; line-height: 1.6; }
  .notes strong { color: var(--gray-700); }

  /* Highlight value */
  .highlight-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }
  .highlight-item {
    background: var(--primary-light); padding: 12px 16px; border-radius: var(--radius-sm);
  }
  .highlight-item .hl-label { font-size: 0.78rem; color: var(--gray-700); }
  .highlight-item .hl-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-top: 2px; }

  /* Valuation cards */
  .valuation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .valuation-grid { grid-template-columns: 1fr; } }
  .valuation-card {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); padding: 20px;
  }
  .valuation-card h4 { margin-bottom: 12px; font-size: 1rem; }
  .valuation-card .metric { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--gray-200); font-size: 0.9rem; }
  .valuation-card .metric:last-child { border-bottom: none; }
  .valuation-card .metric .val { font-weight: 600; }

  /* Responsive */
  @media (max-width: 768px) {
    .report-header h1 { font-size: 1.5rem; }
    .section-body { padding: 16px; }
    .data-table { font-size: 0.8rem; }
    .data-table thead th, .data-table tbody td { padding: 8px 10px; }
    .card-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .card-grid, .highlight-grid { grid-template-columns: 1fr; }
    .report-header .meta { flex-direction: column; align-items: center; gap: 6px; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="loading">
    <div class="spinner"></div>
    <span>正在加载财务数据...</span>
  </div>
  <div id="error">
    <div style="font-size:3rem;">⚠️</div>
    <div>数据加载失败</div>
    <div style="font-size:0.9rem;color:var(--gray-700);">
      请确认 <code>data.json</code> 与 HTML 文件在同一目录下。<br>
      启动本地服务器：<br>
      <code>python -m http.server 8080</code><br>
      浏览器访问 <code>http://localhost:8080/</code> 然后点击 HTML 文件
    </div>
  </div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');

  // ── Load JSON ────────────────────────────────────────────
  let data;
  try {
    // Fetch ASCII-named copy (avoid Windows Chinese filename encoding issues)
    const resp = await fetch(encodeURI('data.json'));
    if (!resp.ok) throw new Error('Failed to load data.json: HTTP ' + resp.status);
    data = await resp.json();
  } catch (err) {
    console.error('Load error:', err);
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    return;
  }

  loadingEl.style.display = 'none';

  // ── Helper functions ─────────────────────────────────────
  const fmt = (n, decimals = 2) => n != null ? Number(n).toFixed(decimals) : '—';
  const fmtPct = (n) => n != null ? Number(n).toFixed(1) + '%' : '—';
  const fmtGrowth = (n) => {
    if (n == null) return '—';
    const v = Number(n);
    const cls = v >= 0 ? 'num-positive' : 'num-negative';
    const sign = v >= 0 ? '+' : '';
    return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
  };
  const fmtBillion = (n) => n != null ? Number(n).toFixed(2) + ' 亿' : '—';

  function h(tag, attrs = {}, ...children) {
    const el = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k === 'innerHTML') el.innerHTML = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else el.setAttribute(k, v);
    }
    for (const c of children) {
      if (typeof c === 'string') el.appendChild(document.createTextNode(c));
      else if (c instanceof Node) el.appendChild(c);
    }
    return el;
  }

  function buildTable(headers, rows) {
    const table = h('table', { className: 'data-table' });
    const thead = h('thead');
    thead.appendChild(h('tr', {}, ...headers.map(th => h('th', { innerHTML: th }))));
    table.appendChild(thead);
    const tbody = h('tbody');
    for (const row of rows) {
      const tr = h('tr', row.cls ? { className: row.cls } : {});
      for (const cell of row.cells) {
        tr.appendChild(h('td', { innerHTML: cell }));
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    return table;
  }

  function section(icon, title, bodyEl) {
    const sec = h('div', { className: 'section' });
    const hdr = h('div', { className: 'section-header' },
      h('span', { className: 'icon' }, icon),
      h('span', {}, title)
    );
    const bdy = h('div', { className: 'section-body' });
    bdy.appendChild(bodyEl);
    sec.appendChild(hdr);
    sec.appendChild(bdy);
    return sec;
  }

  // ── Build content ────────────────────────────────────────
  const content = h('div', { id: 'content' });

  // --- Header ---
  const m = data.report_meta;
  content.appendChild(
    h('div', { className: 'report-header' },
      h('div', { className: 'badge' }, '财务分析报告'),
      h('h1', {}, m.title),
      h('div', { className: 'meta' },
        h('span', {}, '🏢 ', m.company_name),
        h('span', {}, '📈 股票代码: ', h('span', { className: 'stock-code' }, m.stock_code)),
        h('span', {}, '🏛️ ', m.market),
        h('span', {}, '👤 ', m.author),
        h('span', {}, '📅 报告期: ', m.report_period),
        h('span', {}, '🔮 预测期: ', m.forecast_period),
      )
    )
  );

  const container = h('div', { className: 'container' });

  // --- 1. Profitability ---
  {
    const p = data.profitability;
    const rows = p.annual.map(a => ({
      cells: [
        a.year.toString(),
        fmtBillion(a.revenue_billion_cny),
        fmtPct(a.revenue_growth_yoy_pct),
        fmtBillion(a.gross_profit_billion_cny),
        fmtPct(a.gross_margin_pct),
        fmtBillion(a.operating_profit_ebit_billion_cny),
        fmtPct(a.ebit_margin_pct),
        fmtBillion(a.net_profit_attributable_billion_cny),
        fmtPct(a.net_margin_pct),
        fmtGrowth(a.net_profit_growth_yoy_pct),
      ]
    }));
    container.appendChild(section('📊', '盈利能力（2024-2025）',
      h('p', { style: 'color:var(--gray-500);font-size:0.85rem;margin-bottom:12px;' }, p.description)
    ));
    // Add table to the last section's body
    const lastSec = container.lastChild.querySelector('.section-body');
    lastSec.appendChild(buildTable(
      ['年份', '营收（亿）', '营收增速', '毛利（亿）', '毛利率', '营业利润（亿）', 'EBIT率', '归母净利（亿）', '净利率', '净利增速'],
      rows
    ));
  }

  // --- 2. Cost Structure ---
  {
    const c = data.cost_structure_2025;
    const rows = [
      { cells: ['营业成本', fmtBillion(c.cost_of_sales_billion_cny), fmtGrowth(c.cost_of_sales_growth_yoy_pct)] },
      { cells: ['销售费用', fmtBillion(c.sales_expenses_billion_cny), fmtGrowth(c.sales_expenses_growth_yoy_pct)] },
      { cells: ['研发费用', fmtBillion(c.rd_expenses_billion_cny), fmtGrowth(c.rd_expenses_growth_yoy_pct)] },
      { cells: ['研发费用率', fmtPct(c.rd_expenses_pct_of_revenue), '—'] },
    ];
    container.appendChild(section('💰', '2025年费用结构',
      buildTable(['费用项', '金额', '同比增速'], rows)
    ));
  }

  // --- 3. Solvency ---
  {
    const s = data.solvency;
    const rows = s.annual.map(a => ({
      cells: [
        a.year_end.toString(),
        fmtBillion(a.total_assets_billion_cny),
        fmtBillion(a.total_liabilities_billion_cny),
        fmtPct(a.asset_liability_ratio_pct),
        fmt(a.current_ratio),
        fmt(a.quick_ratio),
        fmtBillion(a.undistributed_profit_billion_cny || a.undistributed_profit_billion_cny_approx),
      ]
    }));
    container.appendChild(section('🏦', '偿债能力（年末数据）',
      buildTable(['年末', '总资产（亿）', '总负债（亿）', '资产负债率', '流动比率', '速动比率', '未分配利润（亿）'], rows)
    ));
  }

  // --- 4. Operational Efficiency ---
  {
    const o = data.operational_efficiency;
    const rows = o.annual.map(a => ({
      cells: [
        a.year.toString(),
        fmtBillion(a.inventory_balance_billion_cny),
        fmt(a.inventory_turnover_days_approx, 0) + ' 天',
        fmtBillion(a.accounts_receivable_balance_billion_cny),
        fmt(a.accounts_receivable_turnover_days_approx, 0) + ' 天',
        fmt(a.total_asset_turnover_times) + ' 次',
      ]
    }));
    container.appendChild(section('🔄', '营运效率',
      buildTable(['年份', '存货余额（亿）', '存货周转天数', '应收余额（亿）', '应收周转天数', '总资产周转率（次）'], rows)
    ));
  }

  // --- 5. Cash Flow & Growth ---
  {
    const cf = data.cash_flow_and_growth;
    const rows = cf.annual.map(a => ({
      cells: [
        a.year.toString(),
        fmtPct(a.revenue_growth_yoy_pct),
        fmtGrowth(a.net_profit_growth_yoy_pct),
        fmtBillion(a.operating_cash_flow_billion_cny),
        a.operating_cash_flow_growth_yoy_pct != null ? fmtGrowth(a.operating_cash_flow_growth_yoy_pct) : '—',
        fmtBillion(a.free_cash_flow_billion_cny),
        a.free_cash_flow_growth_yoy_pct != null ? fmtGrowth(a.free_cash_flow_growth_yoy_pct) : '—',
      ]
    }));
    const body = h('div');
    body.appendChild(buildTable(
      ['年份', '营收增速', '净利增速', '经营现金流（亿）', '经营现金流增速', '自由现金流（亿）', '自由现金流增速'],
      rows
    ));
    if (cf.note) {
      body.appendChild(h('p', { className: 'notes', style: 'margin-top:8px;' }, '📝 ' + cf.note));
    }
    container.appendChild(section('💵', '现金流与成长性', body));
  }

  // --- Chart: Revenue & Net Profit Trend ---
  {
    const chartWrapper = h('div', { className: 'chart-wrapper' });
    const canvas = h('canvas', { id: 'trend-chart', width: '1000', height: '400' });
    chartWrapper.appendChild(canvas);
    container.appendChild(section('📈', '营收与净利润趋势（含预测）', chartWrapper));

    // Draw chart after DOM insertion
    setTimeout(() => drawTrendChart(canvas, data), 50);
  }

  // --- 6. Business Highlights ---
  {
    const bh = data.business_highlights;
    const grid = h('div', { className: 'highlight-grid' });
    const items = [
      ['海外收入占比（2025）', fmtPct(bh.overseas_revenue_share_pct_2025)],
      ['中低端销售占比（2024→2025）', fmtPct(bh.mid_low_end_model_sales_share['2024_pct_approx']) + ' → ' + fmtPct(bh.mid_low_end_model_sales_share['2025_pct_approx'])],
      ['中低端毛利率上限', fmtPct(bh.mid_low_end_gross_margin_max_pct)],
      ['资本公积转增', bh.capital_reserve_conversion_2024],
      ['累计折旧（2025）', fmtBillion(bh.accumulated_depreciation_2025_billion_cny)],
      ['预付账款（2025）', fmtBillion(bh.prepayments_balance_2025_billion_cny)],
    ];
    items.forEach(([label, value]) => {
      grid.appendChild(h('div', { className: 'highlight-item' },
        h('div', { className: 'hl-label' }, label),
        h('div', { className: 'hl-value' }, value)
      ));
    });
    container.appendChild(section('⭐', '业务亮点', grid));
  }

  // --- 7. Conclusions ---
  {
    const conclusionsGrid = h('div', { className: 'card-grid' });
    data.conclusions.forEach(c => {
      const card = h('div', { className: 'conclusion-card risk-' + c.risk_flag });
      const topicDiv = h('div', { className: 'conclusion-topic' },
        h('span', {}, c.topic)
      );
      if (c.risk_flag === true) {
        topicDiv.appendChild(h('span', { className: 'risk-badge warn' }, '⚠ 风险信号'));
      } else if (c.risk_flag === false) {
        topicDiv.appendChild(h('span', { className: 'risk-badge ok' }, '✓ 正面'));
      }
      if (c.is_strategic) {
        topicDiv.appendChild(h('span', { className: 'strategic-badge' }, '战略级'));
      }
      card.appendChild(topicDiv);
      card.appendChild(h('p', {}, c.summary));
      if (c.strategic_rationale) {
        card.appendChild(h('div', { className: 'strategic-note' },
          '💡 战略逻辑：' + c.strategic_rationale
        ));
      }
      conclusionsGrid.appendChild(card);
    });
    container.appendChild(section('📝', '分析结论', conclusionsGrid));
  }

  // --- 8. Forecast ---
  {
    const fc = data.forecast;
    const rows = fc.annual.map(a => ({
      cls: 'forecast-row',
      cells: [
        a.year.toString() + 'E',
        fmtBillion(a.revenue_billion_cny),
        fmtGrowth(a.revenue_growth_yoy_pct),
        fmtPct(a.gross_margin_pct),
        a.operating_profit_estimated_billion_cny != null ? fmtBillion(a.operating_profit_estimated_billion_cny) : '—',
        fmtBillion(a.net_profit_billion_cny),
        fmtPct(a.net_margin_pct),
        fmt(a.eps_cny) + ' 元',
      ]
    }));
    const body = h('div');
    body.appendChild(buildTable(
      ['年份', '营收（亿）', '营收增速', '毛利率', '营业利润（亿）', '归母净利（亿）', '净利率', '每股收益（元）'],
      rows
    ));

    // Key assumptions
    body.appendChild(h('h4', { style: 'margin-top:20px;margin-bottom:8px;font-size:0.95rem;' }, '关键假设'));
    const assumpList = h('ul', { className: 'assumption-list' });
    fc.key_assumptions.forEach(a => {
      assumpList.appendChild(h('li', {}, a));
    });
    body.appendChild(assumpList);

    container.appendChild(section('🔮', '2026-2028 财务预测', body));
  }

  // --- 9. Valuation ---
  {
    const v = data.valuation;
    const grid = h('div', { className: 'valuation-grid' });

    // DCF
    const dcfCard = h('div', { className: 'valuation-card' });
    dcfCard.appendChild(h('h4', {}, '📐 ' + v.dcf_model.method));
    [
      ['WACC', fmtPct(v.dcf_model.wacc_pct_approx)],
      ['永续增长率', fmtPct(v.dcf_model.terminal_growth_rate_pct)],
      ['内在价值区间', v.dcf_model.intrinsic_value_billion_cny_range.join(' – ') + ' 亿元'],
      ['每股价值区间', v.dcf_model.implied_value_per_share_cny_range.join(' – ') + ' 元'],
    ].forEach(([label, val]) => {
      const row = h('div', { className: 'metric' },
        h('span', {}, label),
        h('span', { className: 'val' }, val)
      );
      dcfCard.appendChild(row);
    });
    grid.appendChild(dcfCard);

    // PE
    const peCard = h('div', { className: 'valuation-card' });
    peCard.appendChild(h('h4', {}, '📊 ' + v.pe_model.method));
    [
      ['基准年份', v.pe_model.base_year.toString()],
      ['预期 PE', fmt(v.pe_model.expected_pe_approx) + 'x'],
      ['公允价值区间', v.pe_model.fair_value_per_share_cny_range.join(' – ') + ' 元/股'],
    ].forEach(([label, val]) => {
      const row = h('div', { className: 'metric' },
        h('span', {}, label),
        h('span', { className: 'val' }, val)
      );
      peCard.appendChild(row);
    });
    grid.appendChild(peCard);

    const body = h('div');
    body.appendChild(grid);
    body.appendChild(h('p', { className: 'notes', style: 'margin-top:12px;' },
      '⚠️ 敏感性提示：' + v.sensitivity_note
    ));
    container.appendChild(section('💎', '估值分析', body));
  }

  // --- 10. Investment Opinion ---
  {
    const io = data.investment_opinion;
    const ratingCard = h('div', { className: 'rating-card' });
    ratingCard.appendChild(h('div', { className: 'rating-badge' }, '📋 ' + io.rating));

    const adviceDiv = h('div', { className: 'advice' });
    adviceDiv.appendChild(h('div', { className: 'advice-item' },
      h('strong', {}, '短期建议：'), io.short_term_advice
    ));
    adviceDiv.appendChild(h('div', { className: 'advice-item' },
      h('strong', {}, '长期展望：'), io.long_term_view
    ));
    adviceDiv.appendChild(h('div', { className: 'advice-item' },
      h('strong', {}, '升级触发条件：'), io.upgrade_trigger
    ));
    ratingCard.appendChild(adviceDiv);
    container.appendChild(section('🎯', '投资建议', ratingCard));
  }

  // --- 11. Risk Factors ---
  {
    const riskList = h('ul', { className: 'risk-list' });
    data.risk_factors.forEach(r => {
      riskList.appendChild(h('li', {},
        h('span', { className: 'risk-icon' }, '⚠'),
        h('div', {},
          h('strong', {}, r.risk),
          h('div', { className: 'risk-impact' }, r.impact)
        )
      ));
    });
    container.appendChild(section('⚠️', '风险因素', riskList));
  }

  // --- Footer: Data Notes ---
  {
    const dn = data.data_notes;
    const notesDiv = h('div', { className: 'notes' });
    notesDiv.appendChild(h('p', {}, h('strong', {}, '单位说明：'), dn.unit));
    notesDiv.appendChild(h('p', {}, h('strong', {}, '数据来源：'), dn.source));
    notesDiv.appendChild(h('p', {}, h('strong', {}, '数据处理：'), dn.rounding + '；' + dn.approximate_markers + '；' + dn.estimated_markers));
    const footer = h('div', { className: 'section', style: 'padding:16px 24px;' }, notesDiv);
    container.appendChild(footer);
  }

  content.appendChild(container);
  app.appendChild(content);

  // ── Trend Chart (Canvas) ─────────────────────────────────
  function drawTrendChart(canvas, data) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = 400 * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = '400px';
    ctx.scale(dpr, dpr);

    const W = rect.width;
    const H = 400;
    const pad = { top: 30, right: 60, bottom: 50, left: 70 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Data
    const years = ['2024', '2025', '2026E', '2027E', '2028E'];
    const revenues = [119.45, 186.95, 233.07, 290.69, 361.12];
    const netMargins = [16.5, 7.3, 10.3, 11.0, 11.0];
    const grossMargins = [50.1, 42.3, 44.2, 44.4, 44.6];

    const maxRev = Math.max(...revenues) * 1.15;
    const maxMargin = 60;
    const minMargin = 0;

    function x(i) { return pad.left + (i / (years.length - 1)) * plotW; }
    function yRev(v) { return pad.top + plotH - (v / maxRev) * plotH; }
    function yMargin(v) { return pad.top + plotH - ((v - minMargin) / (maxMargin - minMargin)) * plotH; }

    // Clear
    ctx.clearRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = '#e8eaed';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
      const y = pad.top + (plotH / 5) * i;
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
    }

    // Left Y axis (Revenue)
    ctx.fillStyle = '#5f6368';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 5; i++) {
      const val = (maxRev / 5) * (5 - i);
      const y = pad.top + (plotH / 5) * i;
      ctx.fillText(val.toFixed(0) + '亿', pad.left - 8, y + 4);
    }

    // Right Y axis (Margin %)
    ctx.textAlign = 'left';
    for (let i = 0; i <= 5; i++) {
      const val = (maxMargin / 5) * (5 - i);
      const y = pad.top + (plotH / 5) * i;
      ctx.fillText(val.toFixed(0) + '%', W - pad.right + 10, y + 4);
    }

    // Bars (Revenue)
    const barW = Math.min(plotW / years.length * 0.5, 50);
    revenues.forEach((v, i) => {
      const bx = x(i) - barW / 2;
      const by = yRev(v);
      const bw = barW;
      const bh = pad.top + plotH - by;

      const gradient = ctx.createLinearGradient(bx, by, bx, pad.top + plotH);
      gradient.addColorStop(0, i >= 2 ? '#8ab4f8' : '#1a73e8');
      gradient.addColorStop(1, i >= 2 ? '#c5d9fb' : '#4a90d9');
      ctx.fillStyle = gradient;
      ctx.fillRect(bx, by, bw, bh);

      // Bar label
      ctx.fillStyle = '#202124';
      ctx.font = 'bold 11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(v.toFixed(1) + '亿', x(i), by - 6);
    });

    // Line (Net Margin)
    ctx.strokeStyle = '#d93025';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    netMargins.forEach((v, i) => {
      const lx = x(i);
      const ly = yMargin(v);
      if (i === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
    });
    ctx.stroke();

    // Net margin dots
    netMargins.forEach((v, i) => {
      const lx = x(i);
      const ly = yMargin(v);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(lx, ly, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#d93025';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#d93025';
      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(v.toFixed(1) + '%', lx, ly - 14);
    });

    // Gross margin dashed line
    ctx.strokeStyle = '#e37400';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath();
    grossMargins.forEach((v, i) => {
      const lx = x(i);
      const ly = yMargin(v);
      if (i === 0) ctx.moveTo(lx, ly); else ctx.lineTo(lx, ly);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    // Gross margin dots
    grossMargins.forEach((v, i) => {
      const lx = x(i);
      const ly = yMargin(v);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(lx, ly, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#e37400';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = '#e37400';
      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(v.toFixed(1) + '%', lx, ly - 12);
    });

    // X axis labels
    ctx.fillStyle = '#5f6368';
    ctx.font = '12px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    years.forEach((y, i) => {
      ctx.fillText(y, x(i), pad.top + plotH + 20);
    });

    // Legend
    const lx = pad.left;
    const ly = H - 8;
    ctx.font = '11px -apple-system, sans-serif';

    // Revenue
    ctx.fillStyle = '#1a73e8';
    ctx.fillRect(lx, ly - 6, 14, 14);
    ctx.fillStyle = '#202124';
    ctx.textAlign = 'left';
    ctx.fillText('营收（亿元）', lx + 20, ly + 6);

    // Net margin
    ctx.strokeStyle = '#d93025';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(lx + 130, ly + 1); ctx.lineTo(lx + 155, ly + 1); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(lx + 142, ly + 1, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#d93025'; ctx.beginPath(); ctx.arc(lx + 142, ly + 1, 4, 0, Math.PI * 2); ctx.stroke();
    // ctx.fillStyle = '#202124';
    ctx.fillText('净利率（%）', lx + 164, ly + 6);

    // Gross margin
    ctx.strokeStyle = '#e37400';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath(); ctx.moveTo(lx + 260, ly + 1); ctx.lineTo(lx + 285, ly + 1); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(lx + 272, ly + 1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#e37400'; ctx.beginPath(); ctx.arc(lx + 272, ly + 1, 3, 0, Math.PI * 2); ctx.stroke();
    // ctx.fillStyle = '#202124';
    ctx.fillText('毛利率（%）', lx + 292, ly + 6);
  }

  // Redraw chart on resize
  window.addEventListener('resize', () => {
    const canvas = document.getElementById('trend-chart');
    if (canvas) drawTrendChart(canvas, data);
  });
})();
</script>
